<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: preserve the path and redirect correctly
      var seg = window.location.pathname.replace('/portfolio', '').split('/').filter(Boolean);
      var locale = ['en','de','ka'].indexOf(seg[0]) !== -1 ? seg[0] : 'en';
      window.location.replace('/portfolio/' + locale + '/');
    </script>
  </head>
  <body></body>
</html>
